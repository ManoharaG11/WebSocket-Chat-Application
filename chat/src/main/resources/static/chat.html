<!DOCTYPE html>
<html>
<head>
    <title>WebSocket Chat</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        :root{
            --bg1:#f4f6fa;
            --bg2:#e0c3fc;
            --card:#ffffffcc;
            --card-solid:#ffffff;
            --primary:#1976d2;
            --primary2:#1565c0;
            --muted:#5b5b5b;
            --border:rgba(0,0,0,.08);
            --shadow:0 18px 50px rgba(25,118,210,.18);
            --shadow2:0 6px 18px rgba(0,0,0,.08);
            --bubbleMe:#a8edea;
            --bubbleOther:#f9d423;
        }

        *{box-sizing:border-box;}
        html,body{height:100%;}

        body{
            font-family:'Poppins','Segoe UI',Arial,sans-serif;
            background:radial-gradient(900px 500px at 10% 0%, rgba(224,195,252,.55), transparent 60%),
                        linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 100%);
            margin:0;
            padding:0;
        }

        .page{
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:20px;
        }

        #chat{
            width:min(860px, 100%);
            background:var(--card);
            backdrop-filter: blur(10px);
            border:1px solid var(--border);
            border-radius:18px;
            box-shadow:var(--shadow);
            padding:18px;
        }

        .header{
            display:flex;
            align-items:center;
            justify-content:space-between;
            gap:12px;
            margin-bottom:14px;
        }

        .brand{
            display:flex;
            flex-direction:column;
            gap:2px;
        }

        .brand h2{
            margin:0;
            font-size:20px;
            color:var(--primary);
            font-weight:800;
            letter-spacing:.2px;
        }

        .subtitle{
            margin:0;
            font-size:12px;
            color:rgba(0,0,0,.55);
        }

        .pill{
            display:flex;
            align-items:center;
            gap:8px;
            padding:8px 12px;
            border-radius:999px;
            border:1px solid var(--border);
            background:rgba(255,255,255,.6);
            box-shadow:var(--shadow2);
            user-select:none;
        }

        .dot{
            width:10px; height:10px;
            border-radius:50%;
            background:#22c55e;
            box-shadow:0 0 0 6px rgba(34,197,94,.15);
        }

        .timeline{
            height:440px;
            overflow-y:auto;
            border:1px solid var(--border);
            border-radius:14px;
            padding:14px;
            background:rgba(255,255,255,.7);
            margin-bottom:14px;
            display:flex;
            flex-direction:column;
            gap:10px;
            scroll-behavior:smooth;
        }

        .chat-row{display:flex; width:100%;}
        .chat-row.me{justify-content:flex-end;}
        .chat-row.other{justify-content:flex-start;}

        .bubble{
            position:relative;
            padding:10px 14px;
            border-radius:18px;
            font-size:14px;
            max-width:72%;
            min-width:50px;
            word-break:break-word;
            margin-bottom:2px;
            display:flex;
            flex-direction:column;
            gap:4px;
            border:1.5px solid rgba(0,0,0,.06);
            background:#fff;
            box-shadow:0 10px 25px rgba(0,0,0,.06);
            animation:pop .18s ease-out;
        }

        @keyframes pop{from{transform:translateY(6px); opacity:.0}to{transform:translateY(0); opacity:1}}

        .bubble.me{background:color-mix(in srgb, var(--bubbleMe) 35%, #fff 65%); border-color:rgba(27, 197, 196, .35);}
        .bubble.other{background:color-mix(in srgb, var(--bubbleOther) 35%, #fff 65%); border-color:rgba(249, 191, 36, .35);}

        .bubble.me{align-items:flex-end;}
        .bubble.other{align-items:flex-start;}

        .bubble.me::after,
        .bubble.other::after{
            content:"";
            position:absolute;
            top:14px;
            width:0; height:0;
            border-top:9px solid transparent;
            border-bottom:9px solid transparent;
        }

        .bubble.me::after{
            right:-12px;
            border-left:12px solid rgba(27, 197, 196, .9);
        }
        .bubble.other::after{
            left:-12px;
            border-right:12px solid rgba(249, 191, 36, .95);
        }

        .sender{
            font-size:12px;
            color:rgba(0,0,0,.6);
            font-weight:700;
        }
        .msg-content{font-size:14.5px; color:#1f2937; line-height:1.35;}
        .timestamp{font-size:11px; color:rgba(0,0,0,.55); opacity:.95; align-self:flex-end;}

        .notification{
            text-align:center;
            color:rgba(0,0,0,.5);
            font-style:italic;
            font-size:12px;
            padding:8px 10px;
            border-radius:12px;
            border:1px dashed rgba(0,0,0,.14);
            background:rgba(255,255,255,.55);
            user-select:none;
        }

        #join-area,
        #input-area{display:flex; gap:10px; align-items:center; justify-content:center;}
        #join-area{margin-bottom:10px;}

        #from,#content{
            padding:10px 12px;
            border-radius:12px;
            border:1px solid rgba(0,0,0,.12);
            background:rgba(255,255,255,.85);
            font-family:'Poppins','Segoe UI',Arial,sans-serif;
            font-size:15px;
            outline:none;
            transition:border-color .15s, box-shadow .15s;
        }

        #from:focus,#content:focus{
            border-color:rgba(25,118,210,.55);
            box-shadow:0 0 0 4px rgba(25,118,210,.16);
        }

        #from{max-width:160px;}

        button{
            padding:10px 14px;
            border:none;
            border-radius:12px;
            background:var(--primary);
            color:#fff;
            cursor:pointer;
            font-weight:800;
            transition:transform .06s ease, background .2s;
            font-family:'Poppins','Segoe UI',Arial,sans-serif;
            font-size:15px;
            box-shadow:0 12px 30px rgba(25,118,210,.22);
        }

        button:hover{background:var(--primary2);}
        button:active{transform:translateY(1px);}




        #bubbleColor{
            width:44px; height:44px;
            border:none;
            border-radius:14px;
            padding:0;
            background:transparent;
            cursor:pointer;
        }

        .controlsRow{display:flex; gap:10px; align-items:center; justify-content:center;}

        .hidden{display:none !important;}

        .footerHint{
            margin-top:8px;
            text-align:center;
            font-size:12px;
            color:rgba(0,0,0,.55);
        }

        @media (max-width: 680px){
            .timeline{height:330px;}
            .bubble{max-width:85%;}
            #chat{padding:14px;}
            #join-area,#input-area{flex-wrap:wrap;}
        }

        .chat-row {

        }
        .chat-row.me {

    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

    <script src="https://fonts.googleapis.com/css?family=Poppins:400,700&display=swap"></script>

<body>
        <div id="chat">
        <div class="header" style="margin-bottom:10px;">
            <div class="brand">
                <h2>WebSocket Chat</h2>
                <p class="subtitle">Real-time messaging via Spring Boot WebSocket</p>
            </div>
            <div class="pill" title="Status">
                <span class="dot" style="background:#22c55e;"></span>
                <span style="font-weight:800; color:rgba(0,0,0,.65); font-size:12px;">Ready</span>
            </div>
        </div>

        <div id="messages" class="timeline" style="display:none;"></div>

        <div id="join-area" style="text-align:center; margin-bottom:10px;">
            <input type="text" id="from" placeholder="Your name" style="max-width:120px; font-family:'Poppins', 'Segoe UI', Arial, sans-serif; font-size:15px;" />
            <button id="joinBtn" onclick="joinChat()" style="font-family:'Poppins', 'Segoe UI', Arial, sans-serif; font-size:15px;">Join Chat</button>
        </div>
        <div id="input-area" style="display:none;">
            <input type="color" id="bubbleColor" value="#a8edea" title="Pick your bubble color" style="width:36px; height:36px; border:none; margin-right:8px; cursor:pointer;" />
            <input type="text" id="content" placeholder="Type a message..." style="flex:1; font-family:'Poppins', 'Segoe UI', Arial, sans-serif; font-size:15px;" />


            <button id="sendBtn" onclick="sendMessage()" style="font-family:'Poppins', 'Segoe UI', Arial, sans-serif; font-size:15px;">Send</button>
            <button id="leaveBtn" onclick="leaveChat()" style="font-family:'Poppins', 'Segoe UI', Arial, sans-serif; font-size:15px;">Leave</button>


        </div>

        <div class="footerHint" style="margin-top:14px;">
            Developed by <b>Manohar G</b>
        </div>
    </div>
    <script>

        var stompClient = null;
        var username = '';
        var userBubbleColor = '#a8edea';
        var joined = false;

        function connect() {
            var socket = new SockJS('/ws');
            stompClient = Stomp.over(socket);
            stompClient.connect({}, function (frame) {
                stompClient.subscribe('/topic/public', function (message) {
                    var msg = JSON.parse(message.body);
                    if (msg.type === "JOIN" || msg.type === "LEAVE") {
                        showNotification(msg);
                    } else {
                        showMessage(msg);
                    }
                });
            });
        }

        function sendMessage() {
            var from = document.getElementById('from').value.trim();
            var content = document.getElementById('content').value.trim();
            if (!from || !content || !joined) return;
            username = from;
            stompClient.send("/app/chat.sendMessage", {}, JSON.stringify({from: from, content: content}));
            document.getElementById('content').value = '';
        }

        function joinChat() {
            var from = document.getElementById('from').value.trim();
            if (!from || joined) return;
            username = from;
            stompClient.send("/app/chat.join", {}, from);
            joined = true;
            document.getElementById('join-area').style.display = 'none';
            document.getElementById('input-area').style.display = 'flex';
            document.getElementById('messages').style.display = 'block';
            document.getElementById('content').focus();


        }

        function leaveChat() {
            var from = document.getElementById('from').value.trim();
            if (!from || !joined) return;
            stompClient.send("/app/chat.leave", {}, from);
            joined = false;
            document.getElementById('input-area').style.display = 'none';
            document.getElementById('join-area').style.display = 'block';
            document.getElementById('from').value = '';
            document.getElementById('content').value = '';


        }




        document.getElementById('bubbleColor').addEventListener('input', function(e) {
            userBubbleColor = e.target.value;
        });

        function showMessage(message) {
            if (!joined) return;
            var messages = document.getElementById('messages');
            var isMe = (message.from === username);

            // Create row for each message
            var rowDiv = document.createElement('div');
            rowDiv.className = 'chat-row ' + (isMe ? 'me' : 'other');

            var bubbleDiv = document.createElement('div');
            bubbleDiv.className = 'bubble ' + (isMe ? 'me' : 'other');
            bubbleDiv.style.fontFamily = "'Poppins', 'Segoe UI', Arial, sans-serif";
            if (isMe) {
                bubbleDiv.style.setProperty('--bubble-color', userBubbleColor);
            }

            // Extract timestamp if present
            var timeMatch = message.content.match(/\[(\d{2}:\d{2}:\d{2})\]/);
            var timeStr = timeMatch ? timeMatch[1] : '';
            var msgContent = message.content.replace(/\[(\d{2}:\d{2}:\d{2})\]/, '');

            // Sender name
            var senderSpan = document.createElement('span');
            senderSpan.className = 'sender';
            senderSpan.textContent = message.from;

            // Message content
            var contentSpan = document.createElement('span');
            contentSpan.className = 'msg-content';
            contentSpan.textContent = msgContent;

            // Timestamp
            var timeSpan = document.createElement('span');
            timeSpan.className = 'timestamp';
            timeSpan.textContent = timeStr;

            bubbleDiv.appendChild(senderSpan);
            bubbleDiv.appendChild(contentSpan);
            bubbleDiv.appendChild(timeSpan);

            rowDiv.appendChild(bubbleDiv);
            messages.appendChild(rowDiv);
            messages.scrollTop = messages.scrollHeight;
        }

        function showNotification(notification) {
            var messages = document.getElementById('messages');
            var msgDiv = document.createElement('div');
            msgDiv.className = 'notification';
            msgDiv.style.fontFamily = "'Poppins', 'Segoe UI', Arial, sans-serif";
            msgDiv.innerHTML = `<span>${notification.timestamp} - ${notification.user} ${notification.type === 'JOIN' ? 'joined' : 'left'} the chat.</span>`;
            messages.appendChild(msgDiv);
            messages.scrollTop = messages.scrollHeight;
        }

        connect();
    </script>
</body>
